services:
  - type: web
    name: prl-tracker-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: FDV_INCREMENT
        value: "25000000"
      - key: COOLDOWN_SECONDS
        value: "3600"
      - key: POLL_INTERVAL_SECONDS
        value: "60"
